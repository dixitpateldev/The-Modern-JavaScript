<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Lesson Runner</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #1e1e1e; color: #ddd; }
    header { padding: 12px 16px; background: #252526; border-bottom: 1px solid #333; }
    header a { color: #4ec9b0; text-decoration: none; }
    h1 { font-size: 15px; margin: 0 0 4px; font-weight: 600; }
    .file { font-size: 13px; color: #9cdcfe; }
    #output { padding: 12px 16px; margin: 0; white-space: pre-wrap; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; line-height: 1.5; }
    .log { color: #ddd; }
    .error { color: #f48771; }
    .warn { color: #dcdcaa; }
    .meta { color: #6a9955; }
    ul { line-height: 1.9; }
    li a { color: #9cdcfe; }
  </style>
</head>
<body>
  <header>
    <h1>JS Lesson Runner</h1>
    <div class="file" id="fileLabel"></div>
  </header>
  <pre id="output"></pre>

  <script>
    // Lessons available to run (keep in sync with README).
    const LESSONS = [
      ["Variables & Data Types", "01-fundamentals/02-variables.js"],
      ["Basic operators, maths", "01-fundamentals/03-operators.js"],
      ["Objects — the basics", "02-objects-the-basics/01-objects.js"],
    ];

    const out = document.getElementById("output");
    const fileLabel = document.getElementById("fileLabel");

    function print(text, cls) {
      const line = document.createElement("span");
      line.className = cls;
      line.textContent = text + "\n";
      out.appendChild(line);
    }

    // Mirror console output onto the page so learners see results without DevTools.
    ["log", "info", "warn", "error"].forEach((method) => {
      const original = console[method];
      console[method] = (...args) => {
        const cls = method === "error" ? "error" : method === "warn" ? "warn" : "log";
        print(args.map((a) => (typeof a === "object" ? JSON.stringify(a, null, 2) : String(a))).join(" "), cls);
        original.apply(console, args);
      };
    });
    window.addEventListener("error", (e) => print("Error: " + e.message, "error"));

    const params = new URLSearchParams(location.search);
    const file = params.get("file");

    // Only allow relative .js paths inside this repo (no external URLs).
    const safe = file && /^[\w./-]+\.js$/.test(file) && !file.includes("..") && !file.startsWith("/");

    if (!file) {
      fileLabel.textContent = "Pick a lesson to run:";
      const ul = document.createElement("ul");
      LESSONS.forEach(([title, path]) => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = "?file=" + encodeURIComponent(path);
        a.textContent = title;
        li.appendChild(a);
        ul.appendChild(li);
      });
      out.appendChild(ul);
    } else if (!safe) {
      fileLabel.textContent = file;
      print('Refused to load "' + file + '" — only relative .js files in this repo are allowed.', "error");
    } else {
      fileLabel.innerHTML = 'Running: <strong>' + file + '</strong> &nbsp; (open DevTools Console too — prompt/alert appear as popups)';
      print("// running " + file + "\n", "meta");
      const script = document.createElement("script");
      script.src = file;
      script.onerror = () => print('Could not load "' + file + '". Check the path.', "error");
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
